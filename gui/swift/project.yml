name: Cartograph
options:
  bundleIdPrefix: com.scawful
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 7.0.0
targets:
  Cartograph:
    type: application
    platform: macOS
    sources:
      - path: Cartograph/Sources
      - path: Cartograph/Resources/Shared
    dependencies:
      - package: GRDB
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.scawful.cartograph
        INFOPLIST_FILE: Cartograph/Resources/Shared/Info.plist
        CODE_SIGN_ENTITLEMENTS: Cartograph/Resources/Shared/Cartograph.entitlements
    info:
      path: Cartograph/Resources/Shared/Info.plist
      properties:
        CFBundleName: Cartograph
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
  CartographTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Cartograph/Tests
    dependencies:
      - target: Cartograph
schemes:
  Cartograph:
    build:
      targets:
        Cartograph: all
    run:
      config: Debug
    test:
      targets:
        - CartographTests
